<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; script-src 'self'; style-src 'self'; img-src 'self' data: blob:; connect-src https://api.github.com 'self'; base-uri 'none'; form-action 'none'">
  <meta name="theme-color" content="#1A1A1B">
  <title>ADMIN — LUDENS CARD</title>
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <div id="admin-root">

    <!-- 登入視圖 -->
    <section id="view-login" class="panel panel--center">
      <h1 class="panel-title">ADMIN ACCESS</h1>
      <p class="panel-sub">// PERSONAL UNIT CONTROL</p>
      <label class="field">
        <span>帳號</span>
        <input id="login-user" type="text" autocomplete="username" autocapitalize="none">
      </label>
      <label class="field">
        <span>密碼</span>
        <input id="login-pass" type="password" autocomplete="current-password">
      </label>
      <button id="login-btn" type="button" class="btn-primary">ENTER</button>
      <p id="login-err" class="msg msg--err"></p>
      <p class="hint">首次使用？先開 <a href="setup.html">setup.html</a> 完成一次性設定。</p>
    </section>

    <!-- 編輯器視圖 -->
    <section id="view-editor" hidden>
      <header class="topbar">
        <span class="topbar-title">ADMIN // LUDENS-CARD</span>
        <button id="logout-btn" type="button" class="btn-ghost">登出</button>
      </header>

      <section class="panel">
        <h2 class="panel-title">個人資料</h2>
        <label class="field">
          <span>名稱</span>
          <input id="p-name" type="text">
        </label>
        <label class="field">
          <span>Tagline（名字下面那行大字距標語）</span>
          <input id="p-tagline" type="text">
        </label>
        <label class="field">
          <span>簡介</span>
          <textarea id="p-bio" rows="2"></textarea>
        </label>
        <label class="field">
          <span>頭像縮寫（沒傳照片時八角框中間的字，1–2 字）</span>
          <input id="p-initial" type="text" maxlength="2">
        </label>
        <div class="editor-actions">
          <button id="save-profile-btn" type="button" class="btn-primary">儲存個人資料</button>
        </div>
      </section>

      <section class="panel">
        <h2 class="panel-title">大頭貼</h2>
        <div class="avatar-row">
          <img id="avatar-preview" alt="目前頭像" width="96" height="96">
          <p id="avatar-none" hidden>尚未上傳頭像（目前顯示 YN 佔位圖）</p>
          <div class="avatar-actions">
            <input id="avatar-file" type="file" accept="image/*">
            <button id="avatar-upload-btn" type="button" class="btn-primary" disabled>上傳頭像</button>
          </div>
        </div>
        <p class="hint">會自動縮到最長邊 512px、裁八角形顯示。更新後正式站 1–10 分鐘生效。</p>
      </section>

      <section class="panel">
        <h2 class="panel-title">連結</h2>
        <div id="link-cards"></div>
        <div class="editor-actions">
          <button id="add-link-btn" type="button" class="btn-ghost">＋ 新增連結</button>
          <button id="save-links-btn" type="button" class="btn-primary">儲存全部</button>
        </div>
      </section>

      <footer class="statusbar">
        <p id="status-line"></p>
      </footer>
    </section>

  </div>
  <script src="js/admin.js"></script>
</body>
</html>
